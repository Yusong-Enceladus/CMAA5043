name = "brickbuddy"
main = "worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Runtime env vars come from the Cloudflare dashboard (Worker → Settings →
# Variables and Secrets). For local dev put them in `.dev.vars` — see
# `.dev.vars.example` for the template. Never commit real secrets here.
